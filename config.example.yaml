# Planner Agent Configuration

# User profile — shared with Newsletter Agent
about_me: "AboutMe.md"

# LLM settings
llm:
  model: "claude-haiku-4-5"           # Feedback parsing, Analyst, Scout (cheap, fast)
  research_model: "claude-sonnet-4-6"  # Tactician, Critic (smarter)
  strategic_model: "claude-opus-4-8"     # Strategist (weekly, highest quality)
  max_tokens: 16384
  strategic_max_tokens: 8192

# Email — outbound daily briefing
email:
  enabled: true
  from_address: "planner@yourdomain.com"
  to_addresses:
    - "your@gmail.com"

# IMAP — inbound feedback via email replies
imap:
  enabled: true
  server: "imap.gmail.com"
  port: 993
  mailbox: "INBOX"

# Schedule
schedule:
  briefing_time: "07:00"     # When to send daily briefing
  timezone: "Europe/London"

# Weekly time budget (hours)
time_budget:
  weekday: 4          # hours available per weekday
  weekend_day: 6      # hours available per weekend day
  max_weekly: 25       # hard ceiling per week

# Newsletter Agent integration
newsletter:
  project_dir: ""   # path to newsletter-agent project (for CLI invocation)
  enabled: false     # set to true once newsletter-agent is configured
  stale_threshold_days: 7

# Web search — multi-source for deep resource research
search:
  enabled: true
  max_results: 5
  brave:
    enabled: true
    api_key_env: "BRAVE_API_KEY"
  tavily:
    enabled: true
    api_key_env: "TAVILY_API_KEY"
  exa:
    enabled: true
    api_key_env: "EXA_API_KEY"

# Multi-brain orchestration
# All brains auto-trigger via `planner daily` — no separate commands needed
brains:
  strategist:
    enabled: true
    # model_override: "claude-opus-4-8"  # defaults to llm.strategic_model
  critic:
    enabled: true
    # model_override: "claude-sonnet-4-6"  # defaults to llm.research_model
  analyst:
    enabled: true
    # model_override: "claude-haiku-4-5"  # defaults to llm.model
  scout:
    enabled: true
    auto_trigger: true  # set false to disable periodic opportunity discovery

# Skill tracks — all start at "learn" phase
# Phase progression: learn → practice → produce (decided by Strategist)
tracks:
  web_appsec:
    name: "Web Application Security"
    current_phase: "learn"
    priority: "high"
  ai_security:
    name: "AI/ML Security"
    current_phase: "learn"
    priority: "critical"
  agent_engineering:
    name: "AI Agent Engineering"
    current_phase: "learn"
    priority: "high"
  bug_bounty:
    name: "Bug Bounty Hunting"
    current_phase: "learn"
    priority: "high"
  content_creation:
    name: "Content & Research Publishing"
    current_phase: "learn"
    priority: "medium"
  code_review:
    name: "Advanced Code Review"
    current_phase: "learn"
    priority: "medium"
